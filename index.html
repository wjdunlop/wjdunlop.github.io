<!DOCTYPE html>
<html class="staticrypt-html" lang="en-GB">
<head>
  <meta charset="utf-8" />
  <title>Will Dunlop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="cache-control" content="no-cache" />
  <meta http-equiv="pragma" content="no-cache" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1814;
      --ink-soft: rgba(26, 24, 20, 0.7);
      --paper-bg: #d8d7d3;
      --paper-sheet: #ebeae6;
      --accent: #1a3a52;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body.staticrypt-body { height: 100%; margin: 0; }
    body.staticrypt-body {
      background-color: var(--paper-bg);
      background-image:
        radial-gradient(ellipse at 14% 18%, rgba(60, 60, 60, 0.14) 0, transparent 9%),
        radial-gradient(ellipse at 86% 28%, rgba(60, 60, 60, 0.10) 0, transparent 7%),
        radial-gradient(ellipse at 30% 78%, rgba(60, 60, 60, 0.12) 0, transparent 10%),
        radial-gradient(circle at 78% 88%, rgba(60, 60, 60, 0.09) 0, transparent 6%),
        radial-gradient(circle at 50% 50%, rgba(90, 90, 90, 0.05) 0, transparent 70%),
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'><filter id='c'><feTurbulence type='fractalNoise' baseFrequency='0.45' numOctaves='3' stitchTiles='stitch' seed='7'/><feColorMatrix values='0 0 0 0 0.18  0 0 0 0 0.18  0 0 0 0 0.18  0 0 0 0.28 0'/></filter><rect width='100%25' height='100%25' filter='url(%23c)'/></svg>"),
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='f'><feTurbulence type='fractalNoise' baseFrequency='2.2' numOctaves='1' stitchTiles='stitch' seed='3'/><feColorMatrix values='0 0 0 0 0.12  0 0 0 0 0.12  0 0 0 0 0.12  0 0 0 0.26 0'/></filter><rect width='100%25' height='100%25' filter='url(%23f)'/></svg>");
      background-attachment: fixed;
      color: var(--ink);
      font-family: 'Inter', system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .staticrypt-spinner-container {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .staticrypt-spinner {
      width: 1.8rem;
      height: 1.8rem;
      border: 0.18em solid rgba(26,24,20,0.25);
      border-right-color: transparent;
      border-radius: 50%;
      animation: staticrypt-spin 0.8s linear infinite;
    }
    @keyframes staticrypt-spin { to { transform: rotate(360deg); } }

    .staticrypt-content {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .staticrypt-form {
      width: 100%;
      max-width: 420px;
      background: var(--paper-sheet);
      border: 2px solid var(--ink);
      padding: 36px 32px 30px;
      box-shadow:
        3px 3px 0 -1px rgba(26, 24, 20, 0.18),
        6px 6px 0 -3px rgba(26, 24, 20, 0.10);
      transform: rotate(-0.2deg);
      text-align: center;
    }
    .staticrypt-mark {
      display: block;
      margin: 0 auto 18px;
      height: 54px;
      width: auto;
    }
    .staticrypt-title {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 700;
      letter-spacing: -0.02em;
      font-size: 1.7rem;
      margin: 0 0 6px;
      color: var(--ink);
    }
    .staticrypt-instructions p:not(.staticrypt-title) {
      margin: 0 0 20px;
      color: var(--ink-soft);
      font-size: 0.92rem;
      line-height: 1.5;
    }
    .staticrypt-hr {
      border: 0;
      border-top: 1px solid rgba(26,24,20,0.18);
      margin: 0 0 22px;
    }
    .staticrypt-password-container {
      position: relative;
      margin-bottom: 16px;
    }
    .staticrypt-form input[type="password"],
    .staticrypt-form input[type="text"] {
      width: 100%;
      background: transparent;
      border: 0;
      border-bottom: 1.5px solid var(--ink);
      padding: 10px 36px 10px 4px;
      font: inherit;
      font-size: 1.05rem;
      color: var(--ink);
      outline: none;
      border-radius: 0;
      -webkit-appearance: none;
      transition: border-color 0.15s ease;
    }
    .staticrypt-form input::placeholder { color: rgba(26,24,20,0.4); }
    .staticrypt-form input:focus { border-bottom-color: var(--accent); }
    .staticrypt-toggle-password-visibility {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      padding: 8px;
      opacity: 0.5;
      cursor: pointer;
      box-sizing: content-box;
    }
    .staticrypt-toggle-password-visibility:hover { opacity: 0.85; }
    label.staticrypt-remember {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 18px;
      font-size: 0.85rem;
      color: var(--ink-soft);
      text-align: left;
      cursor: pointer;
    }
    .staticrypt-remember input[type="checkbox"] {
      transform: scale(1.05);
      accent-color: var(--accent);
    }
    .staticrypt-form .staticrypt-decrypt-button {
      width: 100%;
      padding: 12px 14px;
      border: 0;
      border-radius: 0;
      background: var(--accent);
      color: var(--paper-sheet);
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color 0.15s ease;
    }
    .staticrypt-form .staticrypt-decrypt-button:hover,
    .staticrypt-form .staticrypt-decrypt-button:focus {
      background: var(--ink);
    }
    .staticrypt-foot {
      margin: 22px 0 0;
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }
    .hidden { display: none !important; }
    @media (max-width: 480px) {
      html, body.staticrypt-body { overflow-x: hidden; }
      .staticrypt-content { padding: 16px; }
      .staticrypt-form {
        padding: 26px 20px 22px;
        max-width: 100%;
      }
      .staticrypt-mark { height: 44px; margin-bottom: 14px; }
      .staticrypt-title { font-size: 1.4rem; }
      .staticrypt-instructions p:not(.staticrypt-title) {
        font-size: 0.88rem;
        margin-bottom: 16px;
      }
      .staticrypt-hr { margin-bottom: 18px; }
      .staticrypt-form input[type="password"],
      .staticrypt-form input[type="text"] {
        /* >=16px on iOS prevents the form-zoom on focus */
        font-size: 16px;
      }
      .staticrypt-form .staticrypt-decrypt-button {
        padding: 13px 14px;
        font-size: 0.8rem;
      }
      label.staticrypt-remember { font-size: 0.82rem; }
    }
    @media (max-width: 360px) {
      .staticrypt-form { padding: 22px 16px 18px; }
      .staticrypt-title { font-size: 1.25rem; }
    }
  </style>
</head>
